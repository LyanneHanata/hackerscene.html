<!DOCTYPE html>
<html>
<head>
  <title>Hacker Cutscene</title>
  <style>
    body { margin:0; background:black; overflow:hidden; }
    canvas { display:block; }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <script>
    const canvas = document.getElementById("scene");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const chars = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%&@";
    let scene = 0, frame = 0;

    function drawChar(x,y,color,size,alpha){
      ctx.fillStyle = color;
      ctx.globalAlpha = alpha;
      ctx.font = size+"px Courier";
      const char = chars[Math.floor(Math.random()*chars.length)];
      ctx.fillText(char,x,y);
      ctx.globalAlpha = 1;
    }

    // Scene 1: Hacker typing fingers
    function hackerTyping(){
      ctx.fillStyle="black"; ctx.fillRect(0,0,canvas.width,canvas.height);
      for(let i=0;i<50;i++){
        const x=300+Math.sin(frame/5+i)*50;
        const y=400+Math.cos(frame/7+i)*20;
        drawChar(x,y,"lime",14,Math.random());
      }
      ctx.fillStyle="lime";
      ctx.font="20px Courier";
      ctx.fillText(">>> typing fast...",350,500);
    }

    // Scene 2: Zoom into laptop
    function zoomLaptop(){
      ctx.fillStyle="black"; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.save();
      ctx.translate(canvas.width/2,canvas.height/2);
      ctx.scale(1+frame/60,1+frame/60);
      for(let i=0;i<200;i++){
        drawChar(Math.random()*200-100,Math.random()*200-100,"lime",16,Math.random());
      }
      ctx.restore();
    }

    // Scene 3: Code comet through wires
    function codeFlow(){
      ctx.fillStyle="black"; ctx.fillRect(0,0,canvas.width,canvas.height);
      for(let i=0;i<10;i++){
        const y=100+i*50;
        for(let x=0;x<canvas.width;x+=40){
          drawChar(x+(frame%40),y,"lime",14,Math.random());
        }
      }
    }

    // Scene 4: Fight silhouettes
    function fightScene(){
      ctx.fillStyle="black"; ctx.fillRect(0,0,canvas.width,canvas.height);
      // Female silhouette (green)
      for(let y=200;y<400;y+=14){
        for(let x=200;x<400;x+=14){
          if((x-300)**2+(y-300)**2<80**2){
            drawChar(x+Math.sin(frame/20)*10,y,"lime",14,Math.random());
          }
        }
      }
      // Firewall silhouette (red)
      for(let y=200;y<400;y+=14){
        for(let x=600;x<800;x+=14){
          if((x-700)**2+(y-300)**2<80**2){
            drawChar(x+Math.cos(frame/25)*10,y,"red",14,Math.random());
          }
        }
      }
      // Clash sparks
      if(frame%20<10){
        drawChar(500,300,"yellow",20,1);
      }
    }

    function animate(){
      frame++;
      if(scene===0){ hackerTyping(); if(frame>300){scene=1; frame=0;} } // 5s
      else if(scene===1){ zoomLaptop(); if(frame>120){scene=2; frame=0;} } // 2s
      else if(scene===2){ codeFlow(); if(frame>600){scene=3; frame=0;} } // 10s
      else if(scene===3){ fightScene(); if(frame>10800){scene=0; frame=0;} } // 3min
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>

    animate();
  </script>
</body>
</html>
